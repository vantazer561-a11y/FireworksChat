name: Build unsigned IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build (unsigned, for device arm64)
        run: |
          set -euo pipefail
          xcodebuild \
            -project FireworksChat.xcodeproj \
            -scheme FireworksChat \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            clean build

      - name: Locate .app
        id: locate
        run: |
          set -euo pipefail
          APP_PATH=$(find build/Build/Products -type d -name "FireworksChat.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "FireworksChat.app not found"
            exit 1
          fi
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
          echo "Found: $APP_PATH"

      - name: Package into .ipa
        run: |
          set -euo pipefail
          rm -rf Payload
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -qr FireworksChat-unsigned.ipa Payload
          ls -la FireworksChat-unsigned.ipa

      - name: Generate scheme if missing
        if: failure()
        run: |
          echo "If the build failed because the scheme is missing, ensure the scheme 'FireworksChat' is shared in Xcode (Product → Scheme → Manage Schemes → Shared)."

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: FireworksChat-unsigned-ipa
          path: FireworksChat-unsigned.ipa
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: FireworksChat-unsigned.ipa
